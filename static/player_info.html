<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette based on Team Colors */
            --brand-blue: #7B8EE3;
            --light-purple: #B8AFFF;
            
            --primary-text-dark: #2C2C3E;
            --secondary-text-dark: #8A8A9E;
            
            --header-text-light: #FFFFFF;
            --subheader-text-light: rgba(255, 255, 255, 0.75);

            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #d8dbe0;
            font-family: 'Mulish', sans-serif;
            padding: 20px;
        }

        .mobile-view {
            width: 375px;
            background-image: linear-gradient(to bottom right, var(--brand-blue), var(--light-purple));
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        .mobile-view::before {
            content: 'METEOR CLUB';
            position: absolute;
            top: 300px;
            left: -20px;
            right: -20px;
            font-size: 80px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 1;
            transform: rotate(-5deg);
        }

        .player-header {
            background: transparent;
            padding: 30px 25px 0 25px;
            position: relative;
            height: 220px;
            display: flex;
            align-items: flex-end;
            z-index: 2;
        }
        
        .player-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.05) 75%, transparent 75%, transparent);
            background-size: 60px 60px;
            opacity: 0.3;
        }

        .player-info {
            position: relative;
            z-index: 2;
        }

        .player-info h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
        }

        .player-info .number {
            font-size: 28px;
            font-weight: 700;
            color: #ffc107;
            margin-top: 10px;
        }
        
        .player-illustration {
            position: absolute;
            bottom: 0;
            right: 10px;
            width: 180px;
            height: 220px;
            /* Placeholder for the illustration */
            background: #ffc107;
            border-top-left-radius: 90px;
            border-top-right-radius: 90px;
        }
        .player-illustration::before { /* Neck */
            content: '';
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: #f3a9bb;
        }
         .player-illustration::after { /* Head */
            content: '';
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 100px;
            background: #f3a9bb;
            border-radius: 50% 50% 40% 40%;
        }


        .main-content {
            padding: 25px;
            position: relative;
            z-index: 2;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .stat-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            width: 30%;
        }

        .stat-item .value {
            font-size: 28px;
            font-weight: 700;
            color: #343a40;
        }

        .stat-item .label {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #343a40;
            margin-bottom: 15px;
        }

        .teams-grid {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .team-logo {
            width: 64px;
            height: 64px;
            border: 1px solid #e9ecef;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            color: #495057;
        }
        
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .match-header {
            text-align: center;
            color: #6c757d;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .match-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
        }

        .team .logo {
            width: 40px;
            height: 40px;
            background-color: #dee2e6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .team-name {
            font-size: 14px;
            font-weight: 500;
            color: #495057;
        }

        .score-info .score {
            font-size: 36px;
            font-weight: 700;
            color: #212529;
        }

        .score-info .status {
            font-size: 12px;
            color: #6c757d;
        }
        
        .see-full-stats {
            text-align: center;
            margin-top: 20px;
        }

        .see-full-stats a {
            color: #495057;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="mobile-view">
        <header class="player-header">
            <div class="player-info">
                <h1>Zlatan<br>Ibrahimovic</h1>
                <p class="number">#10</p>
            </div>
            <div class="player-illustration">
                <!-- This is a simplified placeholder for the illustration -->
            </div>
        </header>

        <main class="main-content">
            <section class="stats-grid">
                <div class="stat-item">
                    <div class="value">570</div>
                    <div class="label">Goals</div>
                </div>
                <div class="stat-item">
                    <div class="value">39</div>
                    <div class="label">Age</div>
                </div>
                <div class="stat-item">
                    <div class="value">ST</div>
                    <div class="label">Position</div>
                </div>
            </section>

            <section class="teams-played">
                <h2 class="section-title">Teams Played for</h2>
                <div class="teams-grid">
                    <div class="team-logo">MU</div>
                    <div class="team-logo">ACM</div>
                    <div class="team-logo">FCB</div>
                    <div class="team-logo">JUV</div>
                </div>
            </section>

            <section class="latest-match">
                <h2 class="section-title">Latest Match</h2>
                <div class="card">
                    <div class="match-header">Champions League - Group Stage: Matchday 3</div>
                    <div class="match-details">
                        <div class="team">
                            <div class="logo">ACM</div>
                            <div class="team-name">AC Milan</div>
                        </div>
                        <div class="score-info">
                            <div class="score">2-1</div>
                            <div class="status">Full-Time</div>
                        </div>
                        <div class="team">
                            <div class="logo">JUV</div>
                            <div class="team-name">Juventus</div>
                        </div>
                    </div>
                    <div class="see-full-stats">
                        <a href="#">See full stats</a>
                    </div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
